{% load static %}

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container">
    <a class="navbar-brand" href="{% url 'homepage:index' %}">
      <img src="{% static 'img/logo.png' %}" alt="Логотип" height="50">
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        {% with request.resolver_match.view_name as view_name %}
        <li class="nav-item">
          <a class="nav-link {% if view_name == 'homepage:index' %}active{% endif %}" 
             href="{% url 'homepage:index' %}">
            Главная
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if view_name == 'ice_cream:ice_cream_list' %}active{% endif %}" 
             href="{% url 'ice_cream:ice_cream_list' %}">
            Каталог мороженого
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if view_name == 'about:description' %}active{% endif %}" 
             href="{% url 'about:description' %}">
            О проекте
          </a>
        </li>
        {% endwith %}
      </ul>
    </div>
  </div>
</nav>
